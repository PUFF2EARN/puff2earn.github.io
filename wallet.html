<script src="https://cdn.jsdelivr.net/npm/ethers@6.11.0/dist/ethers.umd.min.js"></script>
<script src="web3.js"></script>
<script>
var WALLET = JSON.parse(localStorage.getItem('puff-wallet') || 'null') || {
  connected: false, address: '', balance: 1284.50,
  scanRecords: [
    {item:"ELFBAR BC5000",time:"2026-05-15 14:23",puffs:50},
    {item:"SMOK Nord 5",time:"2026-05-14 09:15",puffs:80},
    {item:"Community Airdrop",time:"2026-05-13 20:00",puffs:200}
  ],
  nfts: [null, null, null, null, null, null, null, null, null]
};
var NFT_LIST = [
  {name:"Genesis Cloud",icon:"☁️",rarity:"rare"},
  {name:"Cyber Wave",icon:"🌊",rarity:"common"},
  {name:"Neon Drop",icon:"💧",rarity:"epic"},
  {name:"PUFF-X1",icon:"🔷",rarity:"common"},
  {name:"Vape Aura",icon:"✨",rarity:"rare"},
  {name:"Block Vapor",icon:"🧊",rarity:"common"},
  {name:"Vapor Ghost",icon:"👻",rarity:"epic"},
  {name:"Pixel Puff",icon:"🎮",rarity:"rare"},
  {name:"Chain Link",icon:"🔗",rarity:"common"}
];
var RARITY_VAL = {common:30, rare:80, epic:200};
var products = ["ELFBAR BC5000","SMOK Novo 5","VAPORESSO XROS 3","UWELL Caliburn A3","GeekVape Wenax Q","Voopoo Argus G","Naked 100 Lava Flow","Dinner Lady Lemon Tart","Puff Chain X1","Juice Head Guava"];

var lang = localStorage.getItem('puff-lang') || 'zh';
var i18n = JSON.parse(document.getElementById('i18n-wallet').textContent);

function t(key){return i18n[lang]&&i18n[lang][key]||key}

function saveWallet(){localStorage.setItem('puff-wallet',JSON.stringify(WALLET))}
function renderWallet(){
  document.getElementById('balance-num').textContent = WALLET.connected ? WALLET.balance.toFixed(2) : '--';
  var btn = document.getElementById('wallet-connect-btn');
  btn.textContent = WALLET.connected ? WALLET.address.slice(0,6)+'...'+WALLET.address.slice(-4) : t('wl_connect');
  // Labels
  document.getElementById('wl-title').innerHTML = t('wl_t').replace('钱包','<span style="color:var(--cyan)">钱包</span>').replace('Wallet','<span style="color:var(--cyan)">Wallet</span>').replace('지갑','<span style="color:var(--cyan)">지갑</span>');
  document.getElementById('wl-bal-label').textContent = t('wl_bal');
  document.getElementById('wl-nft-val-label').innerHTML = t('wl_nft_val')+': <span id="nft-val" style="color:var(--purple)">0</span> PUFF';
  document.getElementById('wl-total-val-label').innerHTML = t('wl_total_val')+': <span id="total-val" style="color:var(--cyan)">0</span> PUFF';
  document.getElementById('wl-records-label').textContent = t('wl_records');
  document.getElementById('wl-nft-label').textContent = t('wl_nft');
  document.getElementById('wl-nft-hint').textContent = lang==='zh' ? '点击空位铸造 NFT（消耗 50 PUFF）' : lang==='en' ? 'Click empty slot to mint NFT (costs 50 PUFF)' : '빈 슬롯을 클릭하여 NFT 발행 (50 PUFF 소모)';
  document.getElementById('gen-scan-btn').innerHTML = '📱 '+t('wl_generate');
  document.getElementById('mint-nft-btn').innerHTML = '✨ '+t('wl_mint');
  
  // NFT valuation
  var nftVal = 0;
  WALLET.nfts.forEach(function(n){if(n)nftVal += RARITY_VAL[n.rarity]||0});
  document.getElementById('nft-val').textContent = nftVal;
  document.getElementById('total-val').textContent = (WALLET.balance + nftVal).toFixed(0);
  
  // Scan records
  var recordsEl = document.getElementById('scan-records');
  if(WALLET.scanRecords.length === 0){
    recordsEl.innerHTML = '<div class="empty-state">'+t('wl_empty')+'</div>';
  } else {
    recordsEl.innerHTML = WALLET.scanRecords.map(function(r){
      return '<div class="scan-item"><div class="si-icon">📱</div><div class="si-info"><span class="si-name">'+r.item+'</span><span class="si-time">'+r.time+'</span></div><div class="si-puffs">+'+r.puffs+' PUFF</div></div>';
    }).join('');
  }
  // NFT grid
  var nftEl = document.getElementById('nft-grid-9');
  nftEl.innerHTML = WALLET.nfts.map(function(n,i){
    if(!n) return '<div class="nft-cell empty" data-idx="'+i+'"><span class="nft-placeholder">+</span></div>';
    var rc = n.rarity === 'epic' ? '#ff4081' : (n.rarity === 'rare' ? '#7c4dff' : '#33eaff');
    var rlt = n.rarity === 'epic' ? 'EPIC' : (n.rarity === 'rare' ? 'RARE' : 'COMMON');
    return '<div class="nft-cell" style="border-color:'+rc+';box-shadow:0 0 8px '+rc+'40"><div class="nft-icon">'+n.icon+'</div><div class="nft-name">'+n.name+'</div><div class="nft-rarity" style="color:'+rc+'">'+rlt+'</div></div>';
  }).join('');
  document.querySelectorAll('.nft-cell.empty').forEach(function(el){
    el.addEventListener('click', function(){
      var i = parseInt(this.getAttribute('data-idx'));
      if(!WALLET.connected){ connectWallet(); return; }
      if(WALLET.balance < 50){ alert(t('wl_insufficient')); return; }
      WALLET.balance -= 50;
      var nft = NFT_LIST[i];
      WALLET.nfts[i] = {name:nft.name, icon:nft.icon, rarity:nft.rarity};
      saveWallet(); renderWallet();
    });
  });
  saveWallet();
}

async function connectWallet(){
  // 尝试 MetaMask 连接
  if (typeof window.ethereum !== 'undefined') {
    try {
      var acc = await connectWallet();
      if (acc) {
        WALLET.connected = true;
        WALLET.address = acc;
        WALLET.metaMask = true;
        // 获取链上 PUFF 余额
        try {
          var bal = await getPuffBalance(acc);
          if (parseFloat(bal) > 0) WALLET.balance = parseFloat(bal);
        } catch(e) {}
        renderWallet();
        return;
      }
    } catch(e) {}
  }
  // 降级：本地模拟模式
  if(WALLET.connected && !WALLET.metaMask){
    WALLET.connected = false; WALLET.address = '';
  } else {
    WALLET.connected = true;
    WALLET.metaMask = false;
    WALLET.address = '0x'+Array.from({length:40},function(){return '0123456789abcdef'[Math.floor(Math.random()*16)]}).join('');
    var p = products[Math.floor(Math.random()*products.length)];
    var pts = Math.floor(Math.random()*100)+20;
    WALLET.scanRecords.unshift({item:p, time:new Date().toLocaleString(lang==='zh'?'zh-CN':lang==='en'?'en-US':'ko-KR'), puffs:pts});
    WALLET.balance += pts;
  }
  renderWallet();
}

function genScan(){
  if(!WALLET.connected){ connectWallet(); return; }
  var p = products[Math.floor(Math.random()*products.length)];
  var pts = Math.floor(Math.random()*120)+30;
  WALLET.scanRecords.unshift({item:p, time:new Date().toLocaleString(lang==='zh'?'zh-CN':lang==='en'?'en-US':'ko-KR'), puffs:pts});
  WALLET.balance += pts;
  renderWallet();
}

document.getElementById('wallet-connect-btn').addEventListener('click', connectWallet);
document.getElementById('gen-scan-btn').addEventListener('click', genScan);
document.getElementById('mint-nft-btn').addEventListener('click', function(){
  if(!WALLET.connected){ connectWallet(); return; }
  var idx = WALLET.nfts.indexOf(null);
  if(idx === -1){ alert(t('wl_full')); return; }
  if(WALLET.balance < 50){ alert(t('wl_insufficient')); return; }
  WALLET.balance -= 50;
  var nft = NFT_LIST[idx];
  WALLET.nfts[idx] = {name:nft.name, icon:nft.icon, rarity:nft.rarity};
  renderWallet();
});

document.getElementById('hb2').addEventListener('click', function(){document.getElementById('nr').classList.toggle('mob')});

function sw(l){
  lang = l; localStorage.setItem('puff-lang', l);
  document.getElementById('bzh').className = ''; document.getElementById('ben').className = '';
  document.getElementById('bko').className = '';
  document.getElementById('b'+l).className = 'ac';
  renderWallet();
}
sw(lang);
renderWallet();
</script>
</body>
