<script>
// ============================================================
// Auth Tab Switching
// ============================================================
function switchAuth(tab){
  document.querySelectorAll('.auth-tab').forEach(t=>t.classList.toggle('active', t.id==='tab-'+tab));
  document.querySelectorAll('.auth-form').forEach(f=>f.classList.remove('active'));
  document.getElementById('form-'+tab).classList.add('active');
  document.getElementById('auth-success').style.display = 'none';
  hideAlert();
}

// ============================================================
// localStorage user DB
// ============================================================
function getUsers(){
  try{return JSON.parse(localStorage.getItem('puff-users'))||[]}catch{return []}
}
function saveUsers(u){localStorage.setItem('puff-users',JSON.stringify(u))}
function getSessions(){
  try{return JSON.parse(localStorage.getItem('puff-sessions'))||{}}catch{return {}}
}
function saveSessions(s){localStorage.setItem('puff-sessions',JSON.stringify(s))}

// ============================================================
// Alert
// ============================================================
function showAlert(msg, type){
  const el = document.getElementById('auth-alert');
  el.textContent = msg;
  el.className = 'auth-alert show '+type;
}
function hideAlert(){document.getElementById('auth-alert').className = 'auth-alert';}

// ============================================================
// Login
// ============================================================
function doLogin(){
  hideAlert();
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-pw').value.trim();
  if(!email||!pw){showAlert('请填写邮箱和密码','error');return}
  const users = getUsers();
  const user = users.find(u=>(u.email===email||u.username===email)&&u.password===pw);
  if(!user){showAlert('邮箱或密码错误','error');return}
  // Create session
  const sessions = getSessions();
  const token = 'sess_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
  sessions[token] = {userId:user.id, loginAt:Date.now()};
  saveSessions(sessions);
  localStorage.setItem('puff-session', token);
  // Show success
  showAuthSuccess('login', user.username);
}

// ============================================================
// Register
// ============================================================
function doRegister(){
  hideAlert();
  const email = document.getElementById('reg-email').value.trim();
  const name = document.getElementById('reg-name').value.trim();
  const pw = document.getElementById('reg-pw').value.trim();
  const confirm = document.getElementById('reg-confirm').value.trim();

  if(!email||!name||!pw){showAlert('请填写所有字段','error');return}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showAlert('请输入有效的邮箱地址','error');return}
  if(!/^[a-zA-Z0-9_]{2,20}$/.test(name)){showAlert('用户名需为 2-20 位字母/数字/下划线','error');return}
  if(pw.length<6){showAlert('密码至少 6 位','error');return}
  if(pw!==confirm){showAlert('两次密码不一致','error');return}

  const users = getUsers();
  if(users.find(u=>u.email===email)){showAlert('该邮箱已被注册','error');return}
  if(users.find(u=>u.username===name)){showAlert('该用户名已被使用','error');return}

  // Auto-generate wallet
  const wallet = '0x'+Array.from({length:40},()=>'0123456789abcdef'[Math.floor(Math.random()*16)]).join('');

  users.push({
    id: Date.now(),
    username: name,
    email: email,
    password: pw,
    wallet: wallet,
    puffs: 100, // Welcome bonus
    nftCount: 0,
    orderCount: 0,
    registered: new Date().toISOString()
  });
  saveUsers(users);

  // Auto-login
  const sessions = getSessions();
  const token = 'sess_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
  sessions[token] = {userId:users[users.length-1].id, loginAt:Date.now()};
  saveSessions(sessions);
  localStorage.setItem('puff-session', token);

  showAuthSuccess('register', name);
}

function showAuthSuccess(type, name){
  document.querySelectorAll('.auth-form').forEach(f=>f.classList.remove('active'));
  document.getElementById('auth-success').style.display = 'block';
  document.getElementById('success-title').textContent = type==='register'?'🎉 注册成功！':'👋 欢迎回来！';
  document.getElementById('success-desc').textContent = '你好，'+name+' · 已为你分配钱包地址';
}

function goHome(){window.location.href='index.html'}
function goWallet(){window.location.href='wallet.html'}

// ============================================================
// QR Simulation
// ============================================================
function simulateQr(){
  showAlert('📱 扫码功能即将上线 · 当前为模拟模式','success');
}

// ============================================================
// Page init: detect QR scan parameter
// ============================================================
(function(){
  const url = new URL(window.location.href);
  if(url.searchParams.has('qr')||url.searchParams.has('scan')){
    document.getElementById('scan-badge').style.display = 'flex';
    // Auto-focus to register
    switchAuth('register');
    document.getElementById('reg-name').focus();
  }
  // Check if already logged in
  const token = localStorage.getItem('puff-session');
  if(token){
    const sessions = getSessions();
    if(sessions[token]){
      // User is logged in, show success
      const users = getUsers();
      const user = users.find(u=>u.id===sessions[token].userId);
      if(user) showAuthSuccess('login', user.username);
    }
  }
})();

function sw(lang){
  localStorage.setItem('puff-lang', lang);
  document.documentElement.lang = lang==='zh'?'zh-CN':lang;
  applyLang(lang);
  document.querySelectorAll('.ls button').forEach(b=>{
    b.classList.toggle('ac', b.id==='lang-'+lang);
  });
}

function applyLang(lang){
  const d = LANG_DATA[lang];
  if(!d) return;
  document.getElementById('auth-subtitle').textContent = d.subtitle;
  document.getElementById('tab-login').textContent = d.tab_login;
  document.getElementById('tab-register').textContent = d.tab_register;
  document.getElementById('lbl-email').textContent = d.lbl_email;
  document.getElementById('lbl-pw').textContent = d.lbl_pw;
  document.getElementById('lbl-reg-email').textContent = d.lbl_reg_email;
  document.getElementById('lbl-reg-name').textContent = d.lbl_reg_name;
  document.getElementById('lbl-reg-pw').textContent = d.lbl_reg_pw;
  document.getElementById('lbl-reg-confirm').textContent = d.lbl_reg_confirm;
  document.getElementById('hint-login').textContent = d.hint_login;
  document.getElementById('hint-name').textContent = d.hint_name;
  document.getElementById('hint-reg-pw').textContent = d.hint_reg_pw;
  document.getElementById('btn-login').textContent = d.btn_login;
  document.getElementById('btn-register').textContent = d.btn_register;
  document.getElementById('or-divider').textContent = d.or;
  document.getElementById('or-divider2').textContent = d.or;
  document.getElementById('qr-login-hint').innerHTML = '<span>'+d.qr_login+'</span> · '+d.qr_login_hint;
  document.getElementById('qr-reg-hint').innerHTML = '<span>'+d.qr_reg+'</span> · '+d.qr_reg_hint;
  document.getElementById('extra-login').innerHTML = d.extra_login.replace(/[^<]*$/,'');
  document.getElementById('btn-success').textContent = d.btn_success;
}

// ============================================================
// MetaMask / Web3 钱包登录
// ============================================================
async function doMetaMaskLogin(){
  if(typeof window.ethereum === 'undefined'){
    alert('请安装 MetaMask 浏览器插件\n\nhttps://metamask.io/download');
    window.open('https://metamask.io/download','_blank');
    return;
  }
  try {
    const acc = await connectWallet();
    if(!acc) return;
    // 检查此地址是否已有关联用户
    const users = getUsers();
    let user = users.find(u => u.wallet === acc);
    if(!user) {
      // 新用户自动注册
      const id = 'mm_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
      const name = 'Wallet_' + acc.slice(2,8);
      user = {
        id: id,
        username: name,
        email: acc.toLowerCase() + '@wallet.puff',
        password: 'WEB3_AUTH', // 不可用密码登录
        wallet: acc,
        puffs: 0,
        createdAt: new Date().toISOString(),
        metaMaskUser: true
      };
      users.push(user);
      localStorage.setItem('puff-users', JSON.stringify(users));
    }
    // 创建 session
    const token = 'sess_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,10);
    const sessions = getSessions();
    sessions[token] = {userId: user.id, createdAt: new Date().toISOString()};
    localStorage.setItem('puff-sessions', JSON.stringify(sessions));
    localStorage.setItem('puff-session', token);
    // 显示成功
    showAuthSuccess(user.metaMaskUser ? 'register' : 'login', user.username);
  } catch(e) {
    console.error(e);
    alert('MetaMask 连接失败: ' + e.message);
  }
}

function initLang(){
  const lang = localStorage.getItem('puff-lang')||'zh';
  sw(lang);
}
initLang();
</script>
