<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>关于 · PUFF-CHAIN 白皮书</title>
<meta name="description" content="了解 PUFF-CHAIN：全球首个电子雾化 Web3.0 数字生态的愿景、里程碑与核心团队。">
<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='10' fill='%2300fff9'/></svg>">
</head>
<body>
<header id="nav"></header>

<section class="section wrap">
  <span class="section-tag" data-i18n="foot_about">白皮书</span>
  <h2 class="section-title" data-i18n="ab_title">关于 PUFF-CHAIN</h2>
  <p class="section-sub" data-i18n="ab_sub"></p>
  <div class="card mt40"><p data-i18n="ab_intro" style="font-size:16px;line-height:1.9"></p></div>

  <h3 class="mt40" data-i18n="ab_milestone">里程碑</h3>
  <div class="timeline mt40" id="milestones"></div>

  <h3 class="mt40" data-i18n="ab_team">核心团队</h3>
  <div class="grid g3 mt40" id="team"></div>
</section>

<footer id="footer"></footer>

<script src="i18n.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
<script>
const { renderNav, renderFooter } = PuffApp;
renderNav("nav_about"); renderFooter();

const MILE = [
  { when: "2026 Q1", k: ["项目立项 · 品牌与白皮书发布","Inception · brand & whitepaper","프로젝트 시작 · 브랜드 및 백서"] },
  { when: "2026 Q2", k: ["三大合约部署 Sepolia 测试网","3 contracts deployed to Sepolia","3개 컨트랙트 Sepolia 배포"] },
  { when: "2026 Q3", k: ["主网上线 · PUFF 代币发行","Mainnet · PUFF token issuance","메인넷 · PUFF 토큰 발행"] },
  { when: "2026 Q4", k: ["NFT 市场与质押模块","NFT marketplace & staking","NFT 마켓 및 스테이킹"] },
  { when: "2027",    k: ["DAO 治理 · 品牌生态扩张","DAO governance · ecosystem growth","DAO 거버넌스 · 생태계 확장"] },
  { when: "2028",    k: ["全球千万级设备链上溯源","10M+ devices traced globally","글로벌 천만 대 추적"] },
];
const TEAM = [
  { name: "Alex Chen", role: ["创始人 & CEO","Founder & CEO","창립자 & CEO"], bio: ["前区块链架构师，10 年电子雾化行业经验。","Ex-blockchain architect, 10y in vaping industry.","전 블록체인 아키텍트, 전자담배 업계 10년."], svg: "mod" },
  { name: "Mina Park", role: ["CTO","CTO","CTO"], bio: ["智能合约专家，主导三大合约设计。","Smart-contract expert leading all 3 contracts.","스마트 컨트랙트 전문가, 3개 컨트랙트 설계."], svg: "pod" },
  { name: "Leo Wang", role: ["生态负责人","Head of Ecosystem","생태계 책임자"], bio: ["负责品牌合作与社区治理。","Leads brand partnerships & community.","브랜드 파트너십 및 커뮤니티 담당."], svg: "bar" },
];

function render() {
  const L = PuffI18n.lang === "zh" ? 0 : PuffI18n.lang === "en" ? 1 : 2;
  document.getElementById("milestones").innerHTML = MILE.map(m =>
    `<div class="tl-item done"><div class="dot"></div><span class="when">${m.when}</span><h4>${m.k[L]}</h4></div>`).join("");
  document.getElementById("team").innerHTML = TEAM.map(t =>
    `<div class="card center"><div class="ci-pic" style="width:80px;height:80px;border-radius:50%;margin:0 auto 14px">${PuffData.icon(t.svg)}</div>
      <h4>${t.name}</h4><p class="badge mag" style="margin:8px 0">${t.role[L]}</p>
      <p style="color:var(--muted);font-size:14px">${t.bio[L]}</p></div>`).join("");
}
render();
document.addEventListener("langchange", render);
</script>
</body>
</html>
