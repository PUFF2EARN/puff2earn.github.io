var BRAND_LIST = [...new Set(PRODUCTS.map(p=>p.brand))];

// ====== Cart functions ======
function getCart(){try{return JSON.parse(localStorage.getItem('puff-cart'))||[]}catch{return[]}}
function saveCart(c){localStorage.setItem('puff-cart',JSON.stringify(c))}
function getCartCount(){return getCart().reduce((s,i)=>s+i.qty,0)}
function renderCart(){
  var c=getCart(),el=document.getElementById('cart-items'),t=0,html='';
  document.getElementById('cart-count').textContent=getCartCount();
  if(!c.length){el.innerHTML='<p style="text-align:center;color:var(--gray);padding:1rem;font-family:var(--mono);font-size:0.75rem" data-i="st_empty">璐墿杞︿负绌?/p>';document.getElementById('cart-total-price').textContent='楼0';return}
  c.forEach(function(x){
    var p=PRODUCTS.find(pr=>pr.id===x.id);if(!p)return;
    t+=p.price*x.qty;
    html+='<div class="cart-item"><span class="ci-name">'+p.name+'</span><div class="ci-qty"><button onclick="updateQty('+x.id+',-1)">-</button><span>'+x.qty+'</span><button onclick="updateQty('+x.id+',1)">+</button></div><span class="ci-price">楼'+(p.price*x.qty)+'</span><button class="ci-remove" onclick="removeFromCart('+x.id+')">脳</button></div>';
  });
  el.innerHTML=html;
  document.getElementById('cart-total-price').textContent='楼'+t;
}
function updateQty(id,delta){var c=getCart(),i=c.findIndex(x=>x.id===id);if(i<0)return;c[i].qty+=delta;if(c[i].qty<1)c.splice(i,1);saveCart(c);renderCart()}
function removeFromCart(id){var c=getCart().filter(x=>x.id!==id);saveCart(c);renderCart()}
function clearCart(){localStorage.removeItem('puff-cart');renderCart()}
function toggleCart(){document.getElementById('cart-panel').classList.toggle('show')}

// ====== Store render ======
function renderStore(cat){
  var grid=document.getElementById('store-grid'),html='';
  var prods=cat&&cat!=='all'?PRODUCTS.filter(p=>p.cat===cat):PRODUCTS;
  prods.forEach(function(p){
    var svg=SVG_ICONS[p.img]||SVG_ICONS.elfbar;
    html+='<div class="pdc"><div class="pv">'+svg+'</div><div class="pi"><h4>'+p.name+'</h4><p class="desc" style="color:var(--gray);font-size:0.7rem">'+p.brand+' 路 '+CAT_ICONS[p.cat]+'</p><div class="br"><span class="prc">楼'+p.price+'</span><span style="font-family:var(--mono);font-size:0.6rem;color:var(--pink)">+'+p.puff+' PUFF</span><button class="bb" onclick="addToCart('+p.id+')" data-i="st_b">璐拱</button></div></div></div>';
  });
  grid.innerHTML=html;
  // Re-apply i18n
  document.querySelectorAll('[data-i]').forEach(function(el){
    var k=el.getAttribute('data-i');
    if(i18n[lang]&&i18n[lang][k]){el.textContent=i18n[lang][k]}
  });
}
function filterStore(cat,btn){
  document.querySelectorAll('.scat-btn').forEach(function(b){b.classList.remove('ac')});
  if(btn)btn.classList.add('ac');
  renderStore(cat);
}

// ====== Cart & checkout ======
function addToCart(id){var c=getCart();var p=PRODUCTS.find(x=>x.id===id);if(!p)return;var ex=c.find(x=>x.id===id);if(ex){ex.qty++}else{c.push({id:id,qty:1})}saveCart(c);showNotif('+ '+p.name+' x1');renderCart()}

function showNotif(msg){var el=document.getElementById('notif');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show')},1500)}

function openCheckout(){
  var c=getCart();if(!c.length)return;
  // Check login
  var session=localStorage.getItem('puff-session');
  var u=null;
  if(session){try{var users=JSON.parse(localStorage.getItem('puff-users')||'{}');var sessions=JSON.parse(localStorage.getItem('puff-sessions')||'{}');var uid=Object.keys(sessions).find(function(k){return sessions[k]===session});if(uid&&users[uid])u=users[uid]}catch(){}}
  if(!u){
    var ov=document.getElementById('checkout-overlay');
    document.getElementById('checkout-body').innerHTML='<div style="text-align:center;padding:2rem"><div style="font-size:2rem;margin-bottom:1rem">馃敀</div><h3 style="font-family:var(--mono);font-weight:300;margin-bottom:0.5rem" data-i="st_login_first">请先登录后再购买</h3><div class="ck-actions"><button class="btn bo" onclick="closeCheckout()" data-i="st_cancel">取消</button><a href="register.html" class="btn bp" style="text-decoration:none">登录</a></div></div>';
    ov.classList.add('show');return
  }
  var total=c.reduce(function(s,x){var p=PRODUCTS.find(pr=>pr.id===x.id);return s+(p?p.price*x.qty:0)},0);
  var puff=c.reduce(function(s,x){var p=PRODUCTS.find(pr=>pr.id===x.id);return s+(p?p.puff*x.qty:0)},0);
  document.getElementById('ck-summary').innerHTML=c.map(function(x){var p=PRODUCTS.find(pr=>pr.id===x.id);return p?'<div class="ck-row"><span>'+p.name+' x'+x.qty+'</span><span>楼'+(p.price*x.qty)+'</span></div>':''}).join('')+'<div class="ck-row total"><span data-i="st_total">合计</span><span>楼'+total+'</span></div><div class="ck-row"><span>PUFF 濂栧姳</span><span style="color:var(--pink)">+'+puff+' PUFF</span></div>';
  document.getElementById('checkout-success').style.display='none';
  document.getElementById('checkout-body').querySelector('.ck-form').style.display='block';
  document.querySelectorAll('#ck-name,#ck-phone,#ck-addr').forEach(function(el){el.value=''});
  document.getElementById('checkout-overlay').classList.add('show');
}
function closeCheckout(){document.getElementById('checkout-overlay').classList.remove('show')}
function placeOrder(){
  var c=getCart();if(!c.length)return;
  var total=c.reduce(function(s,x){var p=PRODUCTS.find(pr=>pr.id===x.id);return s+(p?p.price*x.qty:0)},0);
  var puffTotal=c.reduce(function(s,x){var p=PRODUCTS.find(pr=>pr.id===x.id);return s+(p?p.puff*x.qty:0)},0);
  var name=document.getElementById('ck-name').value.trim(),phone=document.getElementById('ck-phone').value.trim(),addr=document.getElementById('ck-addr').value.trim();
  if(!name||!phone||!addr){showNotif('请填写完整信息');return}
  var d=JSON.parse(localStorage.getItem('puff-admin-data')||'null');
  if(!d){d={products:[],orders:[],users:[],nfts:[],partners:[],nextId:{product:17,order:1,user:4,nft:110,partner:5}}}
  var session=localStorage.getItem('puff-session');
  if(!session){showNotif('请先登录');return}
  var sessions=JSON.parse(localStorage.getItem('puff-sessions')||'{}');
  var uid=Object.keys(sessions).find(function(k){return sessions[k]===session});
  var users=JSON.parse(localStorage.getItem('puff-users')||'{}');
  var user=users[uid];
  if(!user){showNotif('用户不存在');return}
  var oid=Date.now().toString(36);
  var order={id:oid,userId:uid,items:c.map(function(x){var p=PRODUCTS.find(pr=>pr.id===x.id);return{productId:x.id,productName:p?p.name:'',qty:x.qty}}),amount:total,puffReward:puffTotal,status:'pending',createdAt:new Date().toISOString(),shipping:{name:name,phone:phone,address:addr}};
  d.orders.push(order);
  d.nextId.order++;
  user.balance=(user.balance||0)+puffTotal;
  user.orderCount=(user.orderCount||0)+1;
  users[uid]=user;
  localStorage.setItem('puff-admin-data',JSON.stringify(d));
  localStorage.setItem('puff-users',JSON.stringify(users));
  localStorage.removeItem('puff-cart');
  document.getElementById('checkout-success').style.display='block';
  document.getElementById('checkout-body').querySelector('.ck-form').style.display='none';
  document.getElementById('ck-order-number').textContent='#'+oid;
  document.getElementById('ck-puff-earned').textContent='+'+puffTotal+' PUFF';
  renderCart();
}
function updateCartI18n(){document.querySelectorAll('[data-i]').forEach(function(el){var k=el.getAttribute('data-i');if(i18n[lang]&&i18n[lang][k])el.textContent=i18n[lang][k]})}

// ====== i18n ======
function sw(l){lang=l;localStorage.setItem('puff-lang',l);updateCartI18n();document.querySelectorAll('.ls button').forEach(function(b){b.classList.remove('ac')});document.getElementById('b'+l).classList.add('ac');updateNavUser()}
sw(lang);

// ====== Nav user ======
function updateNavUser(){
  var el=document.getElementById('nav-user-info');
  var session=localStorage.getItem('puff-session');
  if(!session){el.style.display='none';return}
  try{
    var sessions=JSON.parse(localStorage.getItem('puff-sessions')||'{}');
    var users=JSON.parse(localStorage.getItem('puff-users')||'{}');
    var uid=Object.keys(sessions).find(function(k){return sessions[k]===session});
    if(uid&&users[uid]){document.getElementById('nav-user-name').textContent=users[uid].username||uid.slice(0,8);el.style.display='inline-flex'}else{el.style.display='none'}
  }catch(){el.style.display='none'}
}
function doLogout(){localStorage.removeItem('puff-session');updateNavUser();window.location.href='index.html'}
updateNavUser();
</script>
